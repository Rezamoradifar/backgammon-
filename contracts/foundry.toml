[profile.default]
src = "contracts"
test = "contracts/test"
out = "out"
libs = ["node_modules"]
solc = "0.8.24"
evm_version = "shanghai"
optimizer = true
optimizer_runs = 200

[profile.default.fuzz]
runs = 256

remappings = [
  "forge-std/=node_modules/forge-std/src/",
  "@openzeppelin/contracts/=node_modules/@openzeppelin/contracts/",
]
